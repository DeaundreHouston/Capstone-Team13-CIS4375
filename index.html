<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat Day | Family Catering</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh; /* Ensures footer stays at the bottom */
        }

        h1 {
            text-align: center;
            margin-top: 50px;
            color: #B39DDB;
        }

        /* Footer Styling */
        footer {
            background-color: #333; /* Dark background like the image */
            color: white;
            padding: 40px 20px;
            margin-top: auto; /* Pushes footer to bottom if page content is short */
        }

        .footer-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap; /* Makes it mobile-friendly */
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-column {
            flex: 1;
            min-width: 250px;
            margin-bottom: 20px;
            text-align: center;
        }

        .footer-column h3 {
            color: #B39DDB; /* Accent color for headings */
            margin-bottom: 20px;
        }

        .footer-column p, .footer-column a {
            color: #ccc;
            text-decoration: none;
            display: block;
            margin: 8px 0;
            font-size: 14px;
        }

        .footer-bottom {
            text-align: center;
            border-top: 1px solid #444;
            margin-top: 30px;
            padding-top: 20px;
            color: #888;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <h1>Cheat Day</h1>

    <footer>
        <div class="footer-container">
            <div class="footer-column">
                <h3>Contact Us</h3>
                <p>123 Catering Way</p>
                <p>Fort Worth, TX 76102</p>
                <p>Phone: (210) 722-0119</p>
                <p>Instagram: @cheatday.catering</p>
            </div>

            <div class="footer-column">
                <h3>Opening Hours</h3>
                <p>Monday - Thursday: 11:00 AM - 9:00 PM</p>
                <p>Friday - Saturday: 11:00 AM - 11:00 PM</p>
                <p>Sunday: 12:00 PM - 8:00 PM</p>
            </div>

            <div class="footer-column">
                <h3>Follow Us</h3>
                <a href="https://www.instagram.com/cheatday.catering/" target="_blank">Instagram</a>
            </div>
        </div>

        <div class="footer-bottom">
            <p>&copy; 2026 Cheat Day. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
