<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheat Day</title>
    <style>
        /* General Reset and Flexbox Layout */
        body {
            margin: 0;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Consistent Header Styling */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: #f8f9fa; 
            border-bottom: 1px solid #eee;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #B39DDB; /* Light purple brand color */
            text-decoration: none;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: bold;
        }

        nav a:hover {
            color: #B39DDB;
        }

        /* Main Body Content Area */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px;
        }

        /* Footer Styling */
        footer {
            background-color: #333; /* Dark background as seen in your reference */
            color: white;
            padding: 40px 20px;
            margin-top: auto;
        }

        .footer-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: 0 auto;
        }

        .footer-column {
            flex: 1;
            min-width: 250px;
            margin-bottom: 20px;
            text-align: center;
        }

        .footer-column h3 {
            color: #B39DDB; /* Brand purple for footer headers */
            margin-bottom: 20px;
        }

        .footer-column p, .footer-column a {
            color: #ccc;
            text-decoration: none;
            display: block;
            margin: 8px 0;
            font-size: 14px;
        }

        .footer-column a:hover {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">Cheat Day</a>
        <nav>
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
        </nav>
    </header>

    <main>
        <h2>Welcome to Cheat Day</h2>
        <p>Your destination for family-style catering in Fort Worth.</p>
    </main>

    <footer>
        <div class="footer-container">
            <div class="footer-column">
                <h3>Contact Us</h3>
                <p>Phone: (210) 722-0119</p>
            </div>


            <div class="footer-column">
                <h3>Follow Us</h3>
                <a href="https://www.instagram.com/cheatday.catering/" target="_blank">Instagram</a>
            </div>
        </div>
    </footer>
