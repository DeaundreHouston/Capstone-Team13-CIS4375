<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Login | Cheat Day Catering</title>

  <link rel="stylesheet" href="style.css" />

  <style>
    /* Centers the entire login area */
    .login-wrap {
      max-width: 500px; /* Narrower for a single-column look */
      margin: 60px auto; /* More top margin to center it vertically on the screen */
      padding: 0 20px;
    }

    /* Simplified to a single column */
    .login-grid {
      display: flex;
      justify-content: center;
    }

    .panel {
      background: #FFFACD;
      border: 1px solid #ddd;
      border-radius: 14px;
      padding: 30px; /* Extra padding for a cleaner look */
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
      width: 100%;
    }

    .panel h2 {
      margin: 0 0 15px;
      color: #333;
      text-align: center; /* Center the "Sign in" header */
    }

    .muted {
      color: #666;
      font-size: 14px;
      line-height: 1.45;
      text-align: center; /* Center the demo badge text */
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      color: #333;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      box-sizing: border-box; /* Ensures padding doesn't break the width */
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      outline: none;
      font-size: 14px;
      background: #fff;
    }

    .field input:focus {
      border-color: #B39DDB;
      box-shadow: 0 0 0 3px rgba(179,157,219,0.25);
    }

    .btn-row {
      display: flex;
      flex-direction: column; /* Stack buttons for a cleaner mobile-friendly look */
      gap: 12px;
      margin-top: 20px;
    }

    .btn {
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-weight: 900;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-primary {
      background: #333;
      color: #fff;
    }

    .btn-primary:hover {
      background: #9575CD;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
    }

    .btn-secondary:hover {
      border-color: #B39DDB;
    }

    .badge-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(179,157,219,0.25);
      border: 1px solid rgba(179,157,219,0.5);
      color: #333;
      font-weight: 900;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      background: #333;
      color: #fff;
      padding: 10px 14px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.25);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      pointer-events: none;
      font-size: 0.95rem;
      z-index: 9999;
      border: 1px solid rgba(179,157,219,0.7);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>

<body>
  <header>
    <a href="index.html" class="logo">
      <img src="images/weezler.svg" alt="Cheat Day Logo" class="logo-img">
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="cart.html" class="cart-link">
        Cart <span id="cartCount" class="cart-badge">0</span>
      </a>
      <a href="staff_login.html">Staff Login</a>
    </nav>
  </header>

  <h1 style="text-align: center; margin-top: 40px;">Staff Login</h1>

  <main>
    <div class="login-wrap">
      <div class="login-grid">
        <section class="panel" aria-label="Login form">
          <h2>Sign in</h2>
          <div class="muted">
            <span class="badge-pill">Demo Mode</span>
            <p>Authorized personnel only.</p>
          </div>

          <form id="loginForm" autocomplete="on">
            <div class="form-grid">
              <div class="field">
                <label for="email">Email / Username</label>
                <input id="email" name="email" type="text" required placeholder="staff@cheatday.com" />
              </div>

              <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required placeholder="••••••••" />
              </div>
            </div>

            <div class="btn-row">
              <button class="btn btn-primary" type="submit">Login</button>
              <button class="btn btn-secondary" id="demoFill" type="button">Use Demo Login</button>
            </div>
          </form>
        </section>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-column">
        <h3>Contact Us</h3>
        <p>Phone: (210) 722-0119</p>
      </div>

      <div class="footer-column">
        <h3>Follow Us</h3>
        <a href="https://www.instagram.com/cheatday.catering/" target="_blank">Instagram</a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast">Saved!</div>

  <script>
    /************ Cart badge ************/
    const CART_KEY = "cheatday_cart";
    function getCart() { return JSON.parse(localStorage.getItem(CART_KEY) || "[]"); }
    function cartCount() { return getCart().reduce((sum, line) => sum + (line.qty || 0), 0); }
    function updateCartCount() {
      const el = document.getElementById("cartCount");
      if (el) el.textContent = cartCount();
    }
    updateCartCount();
    window.addEventListener("storage", (e) => { if (e.key === CART_KEY) updateCartCount(); });

    /************ Demo login ************/
    const AUTH_KEY = "cheatday_auth_demo";

    let toastTimer = null;
    function showToast(msg) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove("show"), 1400);
    }

    function saveDemoSession(email) {
      localStorage.setItem(AUTH_KEY, JSON.stringify({
        email,
        loginAt: new Date().toISOString()
      }));
    }

    function handleLogin(email, password) {
      const e = email.toLowerCase();
      if (e === "owner@cheatday.com" && password === "owner123") return "owner";
      if (e === "employee@cheatday.com" && password === "employee123") return "employee";
      return null;
    }

    document.getElementById("demoFill").addEventListener("click", () => {
      document.getElementById("email").value = "employee@cheatday.com";
      document.getElementById("password").value = "employee123";
      showToast("Demo login filled");
    });

    document.getElementById("loginForm").addEventListener("submit", (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const type = handleLogin(email, password);
      if (!type) {
        showToast("Invalid login. Try demo credentials.");
        return;
      }

      saveDemoSession(email);
      showToast("Logged in!");

      // Redirect logic
      if (type === "owner") window.location.href = "staff-dashboard.html";
      else window.location.href = "staff-orders.html";
    });
  </script>
</body>
</html>
